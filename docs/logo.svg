<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <path d="M256 490c-8 0-15-3-20-8C152 410 68 330 68 222V108c0-12 8-23 20-26l160-48c5-2 11-2 16 0l160 48c12 3 20 14 20 26v114c0 108-84 188-168 260-5 5-12 8-20 8z" fill="#000" opacity="0.1" transform="translate(4,4)"/>
  <!-- Shield body -->
  <path d="M256 486c-8 0-15-3-20-8C152 406 68 326 68 218V104c0-12 8-23 20-26l160-48c5-2 11-2 16 0l160 48c12 3 20 14 20 26v114c0 108-84 188-168 260-5 5-12 8-20 8z" fill="url(#shieldGrad)"/>
  <!-- Shield highlight -->
  <path d="M256 50l160 48v120c0 100-80 180-160 250V50z" fill="#ffffff" opacity="0.08"/>
  <!-- Tunnel icon (two connected circles with line) -->
  <g transform="translate(256,240)">
    <!-- Lock body -->
    <rect x="-45" y="-10" width="90" height="70" rx="12" fill="url(#lockGrad)"/>
    <!-- Lock shackle -->
    <path d="M-25-10 v-25 a25,25 0 0,1 50,0 v25" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <!-- Keyhole -->
    <circle cx="0" cy="25" r="12" fill="url(#shieldGrad)"/>
    <rect x="-4" y="25" width="8" height="18" rx="3" fill="url(#shieldGrad)"/>
  </g>
  <!-- Connection arrows -->
  <g opacity="0.85">
    <!-- Left arrow -->
    <line x1="120" y1="350" x2="180" y2="320" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <polygon points="180,320 168,330 172,316" fill="#fff"/>
    <!-- Right arrow -->
    <line x1="392" y1="350" x2="332" y2="320" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <polygon points="332,320 344,330 340,316" fill="#fff"/>
    <!-- Bottom dots -->
    <circle cx="110" cy="358" r="6" fill="#fff" opacity="0.7"/>
    <circle cx="402" cy="358" r="6" fill="#fff" opacity="0.7"/>
  </g>
</svg>
