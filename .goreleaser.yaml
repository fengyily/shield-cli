version: 2

project_name: shield-cli

builds:
  - main: .
    binary: shield
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X shield-cli/cmd.Version={{.Version}}
      - -X shield-cli/cmd.GitCommit={{.Commit}}
      - -X shield-cli/cmd.BuildTime={{.Date}}

archives:
  - format: tar.gz
    name_template: "shield-{{ .Os }}-{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: fengyily
      name: homebrew-tap
    homepage: "https://github.com/fengyily/shield-cli"
    description: "Shield CLI - Secure Tunnel Connector"
    license: "MIT"
    install: |
      bin.install "shield"
    test: |
      system "#{bin}/shield", "--help"
    caveats: |
      Web UI (recommended):
        shield start                # Open http://localhost:8181

      Command line (for servers):
        shield ssh                  # 127.0.0.1:22
        shield ssh 10.0.0.2        # 10.0.0.2:22
        shield rdp 192.168.1.100   # 192.168.1.100:3389
        shield http 3000            # 127.0.0.1:3000

      Supported protocols: ssh, http, https, rdp, vnc, telnet

      Run 'shield --help' for more options.

scoops:
  - repository:
      owner: fengyily
      name: scoop-bucket
    homepage: "https://github.com/fengyily/shield-cli"
    description: "Shield CLI - Secure Tunnel Connector"
    license: Apache-2.0

nfpms:
  - package_name: shield-cli
    homepage: "https://github.com/fengyily/shield-cli"
    maintainer: "fengyily <fengyily@users.noreply.github.com>"
    description: "Shield CLI - Secure Tunnel Connector"
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
